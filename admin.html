<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css" />

    <script>
      (function () {
        const isAdmin = localStorage.getItem("is_admin");
        const token = localStorage.getItem("accessToken");

        if (!token) {
          window.location.href = "signin.html";
          return;
        }

        if (isAdmin !== "1") {
          window.location.href = "dashboard.html";
        }
      })();
    </script>
  </head>
  <body>
    <div class="header">
      <h2>Crop Estimator</h2>
      <div id="menu-icon">☰</div>
    </div>

    <div class="sidebar" id="sidebar">
      <h3>Navigation</h3>
      <br />

      <a href="dashboard.html">Dashboard</a>
      <a href="history.html">History</a>
      <a href="profile.html">Profile</a>
      <a href="admin.html">Admin</a>
      <a href="signout.html">Logout</a>
    </div>

    <div class="main">
      <h1>Admin Dashboard</h1>

      <!-- Stats Cards -->
      <div class="admin-stats">
        <div class="stat-card">
          <h3 id="totalUsers">0</h3>
          <p>Total Users</p>
        </div>

        <div class="stat-card">
          <h3 id="totalPredictions">0</h3>
          <p>Total Predictions</p>
        </div>

        <div class="stat-card">
          <h3 id="topCrop">-</h3>
          <p>Most Predicted Crop</p>
        </div>
      </div>

      <!-- Admin Controls -->

      <div class="admin-controls">
        <button class="submit-btn" id="loadUsers">👥 View Users</button>

        <button class="submit-btn" id="loadPredictions">
          📊 View Predictions
        </button>
      </div>

      <h3 id="tableHeading"></h3>

      <div class="admin-table">
        <table>
          <thead>
            <tr id="tableHead"></tr>
          </thead>

          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      async function loadTable(endpoint, heading, columns) {
        document.getElementById("tableHeading").textContent = heading;
        const head = document.getElementById("tableHead");
        const body = document.getElementById("tableBody");
        head.innerHTML = columns
          .map((c) => `<th style="padding:8px;text-align:left">${c}</th>`)
          .join("");
        body.innerHTML =
          "<tr><td colspan='" + columns.length + "'>Loading…</td></tr>";
        try {
          const res = await apiFetch(API + endpoint);
          const rows = await res.json();
          body.innerHTML = "";
          if (!rows.length) {
            body.innerHTML = `<tr><td colspan="${columns.length}">No data.</td></tr>`;
            return;
          }
          rows.forEach((row) => {
            const tr = document.createElement("tr");
            tr.innerHTML = columns
              .map(
                (c) =>
                  `<td style="padding:8px">${row[c.toLowerCase().replace(/ /g, "_")] ?? "—"}</td>`,
              )
              .join("");
            body.appendChild(tr);
          });
        } catch (err) {
          body.innerHTML = `<tr><td colspan="${columns.length}" style="color:red">Error: ${err.message}</td></tr>`;
        }
      }

      /// Admin Deshboard Logic///
      async function loadAdminStats() {
        try {
          const users = await apiFetch(API + "/admin/users");
          const usersData = await users.json();

          document.getElementById("totalUsers").textContent = usersData.length;

          const preds = await apiFetch(API + "/admin/predictions");
          const predsData = await preds.json();

          document.getElementById("totalPredictions").textContent =
            predsData.length;

          let cropCount = {};

          predsData.forEach((p) => {
            cropCount[p.predicted_crop] =
              (cropCount[p.predicted_crop] || 0) + 1;
          });

          let topCrop = Object.keys(cropCount).reduce(
            (a, b) => (cropCount[a] > cropCount[b] ? a : b),
            "-",
          );

          document.getElementById("topCrop").textContent = topCrop;
        } catch (e) {
          console.log(e);
        }
      }

      loadAdminStats();

      document
        .getElementById("loadUsers")
        .addEventListener("click", () =>
          loadTable("/admin/users", "All Users", [
            "ID",
            "Full Name",
            "Email",
            "Is Admin",
            "Created At",
          ]),
        );
      document
        .getElementById("loadPredictions")
        .addEventListener("click", () =>
          loadTable("/admin/predictions", "All Predictions", [
            "ID",
            "User ID",
            "Predicted Crop",
            "Best Model",
            "Created At",
          ]),
        );
    </script>
  </body>
</html>
