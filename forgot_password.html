<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Forgot Password - Crop Estimator</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="auth-body">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h2><i class="fas fa-unlock-alt"></i> Forgot Password</h2>

          <p>Enter your email to receive a reset link</p>
        </div>

        <form id="forgotForm" class="auth-form">
          <div class="form-group">
            <label>Email Address</label>

            <input type="email" id="email" required />
          </div>

          <button type="submit" class="submit-btn auth-btn">
            <i class="fas fa-paper-plane"></i> Send Reset Link
          </button>
        </form>

        <p id="message" style="margin-top: 15px"></p>

        <div class="auth-links">
          <a href="signin.html">Back to Sign In</a>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("forgotForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = document.getElementById("email").value;

          try {
            const response = await fetch(
              "http://127.0.0.1:5000/forgot_password",
              {
                method: "POST",

                headers: {
                  "Content-Type": "application/json",
                },

                body: JSON.stringify({
                  email: email,
                }),
              },
            );

            const data = await response.json();

            if (response.ok) {
              document.getElementById("message").innerText =
                "Reset link sent to your email";
              document.getElementById("message").style.color = "green";
            } else {
              document.getElementById("message").innerText =
                data.error || "Failed to send reset link";
              document.getElementById("message").style.color = "red";
            }
          } catch (err) {
            document.getElementById("message").innerText = "Server error";
            document.getElementById("message").style.color = "red";
          }
        });
    </script>
  </body>
</html>
