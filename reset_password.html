<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reset Password - Crop Estimator</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="auth-body">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h2><i class="fas fa-key"></i> Reset Password</h2>
          <p>Enter your new password below</p>
        </div>

        <form id="resetForm" class="auth-form">
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword" required />
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" required />
          </div>

          <button type="submit" class="submit-btn auth-btn">
            <i class="fas fa-lock"></i> Update Password
          </button>
        </form>

        <p id="message" style="margin-top: 15px"></p>

        <div class="auth-links">
          <a href="signin.html">Back to Sign In</a>
        </div>
      </div>
    </div>

    <script>
      // get token from URL
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      document
        .getElementById("resetForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const password = document.getElementById("newPassword").value;
          const confirm = document.getElementById("confirmPassword").value;

          if (password !== confirm) {
            document.getElementById("message").innerText =
              "Passwords do not match";
            document.getElementById("message").style.color = "red";

            return;
          }

          try {
            const response = await fetch(
              "http://127.0.0.1:5000/reset_password",
              {
                method: "POST",

                headers: {
                  "Content-Type": "application/json",
                },

                body: JSON.stringify({
                  token: token,
                  new_password: password,
                }),
              },
            );

            const data = await response.json();

            if (response.ok) {
              document.getElementById("message").innerText =
                "Password updated successfully!";
              document.getElementById("message").style.color = "green";

              setTimeout(() => {
                window.location.href = "signin.html";
              }, 2000);
            } else {
              document.getElementById("message").innerText =
                data.error || "Reset failed";
              document.getElementById("message").style.color = "red";
            }
          } catch (err) {
            document.getElementById("message").innerText = "Server error";
            document.getElementById("message").style.color = "red";
          }
        });
    </script>
  </body>
</html>
